<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <!-- Link to Bootstrap CSS for grid and table styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Our Product Catalog</h2>
    
    <!-- Table Container -->
    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Product Image</th>
                    <th>Product Name</th>
                    <th>Price (INR ₹)</th>
                    <th>Description</th>
                </tr>
            </thead>
            <!-- The JavaScript will inject <tr> elements into this <tbody> -->
            <tbody id="product-body"></tbody>
        </table>
    </div>

    <!-- Pagination Navigation -->
    <nav>
        <!-- The JavaScript will inject <li> buttons into this <ul> -->
        <ul class="pagination justify-content-center" id="pagination-controls"></ul>
    </nav>
</div>

<!-- Main Logic Script -->
<script src="main.js"></script>
</body>
</html>
