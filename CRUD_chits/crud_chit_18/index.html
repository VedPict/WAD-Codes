    <title>Music</title>

<body>
    <ul id="list_songs"></ul>

<script>
    function search_director(director_name){
        fetch(`/search/${director_name}`)
        .then(res => res.json())
        .then(data => {
            alert(JSON.stringify(data));
        })
    }

    function search_director_singer(director_singer){
        fetch(`/search/${director_singer}`)
        .then(res => res.json())
        .then(data => {
            alert(JSON.stringify(data));
        })
    }
</script>
</html>
