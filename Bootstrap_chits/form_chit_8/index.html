<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>

    <!-- Bootstrap CSS: The framework providing pre-built components and grid layouts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            /* Light gray background to make the white form "pop" */
            background-color: #f8f9fa;
        }

        .form-box {
            background: white;
            padding: 25px;
            /* Creates rounded corners (10px radius) */
            border-radius: 10px;
            /* horizontal offset | vertical offset | blur | spread | color (0.1 opacity black) */
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- .container: centers content and provides responsive fixed widths -->
<!-- .mt-5: Margin-Top level 5 (adds spacing at the top) -->
<div class="container mt-5">
    <!-- .row: A flexbox wrapper for columns -->
    <!-- .justify-content-center: Centers the column horizontally in the row -->
    <div class="row justify-content-center">

        <!-- .col-md-6: Column spans 6 out of 12 units on Medium screens and larger -->
        <div class="col-md-6">
            <div class="form-box">

                <!-- .mb-4: Margin-Bottom level 4 | .text-center: aligns text to middle -->
                <h3 class="mb-4 text-center">Event Registration</h3>

                <!-- .needs-validation: A custom class used by JS to target this form -->
                <!-- novalidate: Prevents the browser's default validation bubbles so we can use Bootstrap UI -->
                <form class="needs-validation" novalidate>

                    <!-- ================= NAME ================= -->
                    <!-- .form-floating: Wraps input/label to create the animated "floating" effect -->
                    <!-- .mb-3: Adds consistent spacing between form fields -->
                    <div class="form-floating mb-3">
                        <!-- required: HTML5 attribute used for validation -->
                        <input type="text" class="form-control" id="name" placeholder="Name" required>
                        <label for="name">Full Name</label>

                        <!-- .invalid-feedback: Hidden by default, shown only when validation fails -->
                        <div class="invalid-feedback">
                            Please enter your name.
                        </div>
                    </div>

                    <!-- ================= EMAIL ================= -->
                    <div class="form-floating mb-3">
                        <!-- type="email": Triggers built-in browser checks for "@" and domain structure -->
                        <input type="email" class="form-control" id="email" placeholder="Email" required>
                        <label for="email">Email address</label>

                        <div class="invalid-feedback">
                            Enter a valid email.
                        </div>
                    </div>

                    <!-- ================= PHONE ================= -->
                    <div class="form-floating mb-3">
                        <!-- type="tel": Mobile browsers show a numeric keypad for this input -->
                        <input type="tel" class="form-control" id="phone" placeholder="Phone" required>
                        <label for="phone">Phone Number</label>

                        <div class="invalid-feedback">
                            Enter your phone number.
                        </div>
                    </div>

                    <!-- ================= EVENT TYPE ================= -->
                    <div class="mb-3">
                        <!-- .form-label: Standard label styling (used here because select isn't floating) -->
                        <p>Select Event</p>

                        <!-- .form-select: Styles the dropdown menu -->
                        <select class="form-select" required>
                            <!-- value="": An empty value is required for the dropdown to be "invalid" when not picked -->
                            <option value="">Choose...</option>
                            <option>Workshop</option>
                            <option>Seminar</option>
                            <option>Hackathon</option>
                        </select>

                        <div class="invalid-feedback">
                            Please select an event.
                        </div>
                    </div>

                    <!-- ================= DATE ================= -->
                    <div class="form-floating mb-3">
                        <input type="date" class="form-control" required>
                        <label>Select Date</label>

                        <div class="invalid-feedback">
                            Please choose a date.
                        </div>
                    </div>

                    <!-- ================= TOOLTIP FIELD ================= -->
                    <div class="mb-3">
                        <label class="form-label">
                            Referral Code
                            <!-- data-bs-toggle="tooltip": Attribute used by JS to find elements needing tooltips -->
                            <!-- title: The text that will appear inside the tooltip bubble -->
                            <span data-bs-toggle="tooltip" title="Optional code if you were invited">
                                ℹ️
                            </span>
                        </label>

                        <input type="text" class="form-control" placeholder="Enter code (optional)">
                    </div>

                    <!-- ================= TERMS ================= -->
                    <div class="form-check mb-3">
                        <!-- .form-check-input: Styles the checkbox -->
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">
                            I agree to terms and conditions
                        </label>

                        <div class="invalid-feedback">
                            You must agree before submitting.
                        </div>
                    </div>

                    <!-- ================= SUBMIT ================= -->
                    <!-- .btn-primary: The main blue theme color | .w-100: Width 100% -->
                    <button class="btn btn-primary w-100">Register</button>

                </form>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap Bundle JS: Includes Popper.js (required for Tooltips/Popovers) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ================= VALIDATION SCRIPT =================
    (() => {
        'use strict'; // Prevents common JS coding errors

        // Find all forms we want to apply validation to
        const forms = document.querySelectorAll('.needs-validation');

        // Loop over them and prevent submission if rules aren't met
        forms.forEach(form => {
            form.addEventListener('submit', event => {

                // checkValidity(): Built-in JS method that checks if all 'required' rules are met
                if (!form.checkValidity()) {
                    event.preventDefault(); // Stop the form from actually sending
                    event.stopPropagation(); // Stop the event from bubbling up
                }

                // .was-validated: A Bootstrap class that triggers the green/red CSS colors on inputs
                form.classList.add('was-validated');
            });
        });
    })();

    // ================= TOOLTIP INIT =================
    // Tooltips are Opt-in in Bootstrap, meaning you MUST initialize them with JS
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');

    // Convert list to array and create a new Tooltip instance for each element
    tooltipTriggerList.forEach(el => {
        new bootstrap.Tooltip(el);
    });
</script>

</body>
</html>
